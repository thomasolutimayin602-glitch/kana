<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f5efe4" />
    <title>五十音闪卡 - 日本留学一站通</title>
    <link rel="stylesheet" href="web/portal.css" />
  </head>
  <body>
    <main class="shell kana-shell">
      <section class="panel module-panel kana-page" aria-label="五十音与发音练习">
        <div class="module-panel-head">
          <div>
            <p class="section-kicker">N4 Module</p>
            <h1>五十音闪卡</h1>
            <p>先查看五十音图，再进入闪卡训练。闪卡训练时会隐藏五十音图，避免直接看到答案。</p>
          </div>
          <div class="kana-top-actions">
            <div class="script-toggle" role="group" aria-label="假名显示切换">
              <button class="script-button is-active" type="button" data-kana-script="hiragana">平假名</button>
              <button class="script-button" type="button" data-kana-script="katakana">片假名</button>
            </div>
            <p class="cache-status" id="cacheStatus">音频缓存准备中...</p>
            <div class="score-box" aria-label="答题统计">
              <span id="correctCount">0</span>
              <span id="answeredCount">/0</span>
            </div>
          </div>
        </div>

        <div class="kana-section-tabs" role="tablist" aria-label="五十音页面分区">
          <button class="section-tab is-active" type="button" data-kana-section="chart">五十音图</button>
          <button class="section-tab" type="button" data-kana-section="romaji-to-kana">听音选假名</button>
          <button class="section-tab" type="button" data-kana-section="kana-to-romaji">看假名选音</button>
        </div>

        <div class="kana-sections">
          <section class="kana-chart-section" id="chartSection" aria-label="五十音图">
            <div class="section-panel-head">
              <div>
                <h2>五十音图</h2>
                <p>包含清音、浊音/半浊音与拗音。开始训练后本表会被隐藏。</p>
              </div>
              <button class="secondary-button help-button" id="helpButton" type="button" style="min-height: 36px; padding: 0 14px; font-size: 13px; display: flex; align-items: center; gap: 6px; align-self: flex-start; margin-top: 4px;">
                <span style="font-weight: bold; font-size: 14px;">?</span>使用帮助
              </button>
            </div>

            <div id="kanaTable"></div>
          </section>

          <section class="practice-panel kana-flashcard-section is-hidden" id="flashcardSection" aria-label="五十音闪卡训练">
            <div class="answer-effect" id="answerEffect" aria-hidden="true"></div>

            <div class="mode-tabs" role="tablist" aria-label="训练模式">
              <button class="mode-tab is-active" type="button" data-kana-mode="all">整体</button>
              <button class="mode-tab" type="button" data-kana-mode="row">按行</button>
              <button class="mode-tab" type="button" data-kana-mode="column">按列</button>
            </div>

            <div class="filter-scroll is-hidden" id="filterScroll">
              <div class="filter-track" id="filterTrack"></div>
            </div>

            <div class="card-head">
              <span id="scopeLabel">整体训练</span>
              <span id="progressText">1 / 46</span>
            </div>

            <label class="auto-next-toggle">
              <input id="autoNextToggle" type="checkbox" />
              <span>答对后 1 秒自动下一题</span>
            </label>

            <div class="prompt">
              <div>
                <span class="prompt-label" id="promptLabel">读音</span>
                <span class="sound-mark" id="soundMark">?</span>
              </div>
              <button class="play-button" id="playButton" type="button" aria-label="播放读音">
                <span aria-hidden="true">▶</span>
              </button>
            </div>

            <div class="answer-grid" id="answerGrid"></div>

            <p class="feedback" id="feedbackText">待作答</p>

            <div class="actions">
              <button class="secondary-button" id="resetButton" type="button">重练本组</button>
              <button class="primary-button" id="nextButton" type="button" disabled>下一题</button>
            </div>
          </section>
        </div>
      </section>
    </main>

    <!-- Interactive Tutorial Overlay and Card -->
    <div id="tutorialOverlay" class="tutorial-overlay is-hidden" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: transparent; z-index: 9999; pointer-events: auto;"></div>
    <div id="tutorialSpotlight" class="tutorial-spotlight" style="position: fixed; z-index: 10000; pointer-events: none; border-radius: 6px; box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.65); transition: all 0.25s ease-out; display: none;"></div>
    
    <div id="tutorialCard" class="tutorial-card is-hidden" style="position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); width: min(calc(100vw - 32px), 400px); background: #ffffff; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.15); padding: 18px; z-index: 10001; transition: opacity 0.25s ease-out, transform 0.25s ease-out;">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
        <span id="tutorialStepIndicator" style="font-size: 12px; font-weight: bold; color: var(--accent);">步骤 1 / 4</span>
        <button id="tutorialClose" type="button" style="background: transparent; border: 0; font-size: 18px; color: var(--muted); cursor: pointer; line-height: 1;">&times;</button>
      </div>
      <p id="tutorialText" style="margin: 0 0 16px 0; font-size: 14px; line-height: 1.5; color: var(--text); font-weight: 500;">打钩可以把本列加入练习。</p>
      <div style="display: flex; justify-content: flex-end; gap: 8px;">
        <button id="tutorialNext" class="primary-button" type="button" style="min-height: 36px; padding: 0 16px; font-size: 13px;">下一步</button>
      </div>
    </div>

    <script src="web/kana.js"></script>
  </body>
</html>
